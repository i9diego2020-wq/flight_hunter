name: ✈️ Flight Hunter

on:
  # Desativado — disparo apenas manual se necessário
  workflow_dispatch:

jobs:
  hunt:
    name: Hunt for flight deals
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🛫 Run Flight Hunter
        env:
          TELEGRAM_TOKEN:         ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
          AMADEUS_CLIENT_ID:      ${{ secrets.AMADEUS_CLIENT_ID }}
          AMADEUS_CLIENT_SECRET:  ${{ secrets.AMADEUS_CLIENT_SECRET }}
        run: npx ts-node src/index.ts
