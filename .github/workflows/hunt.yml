name: ✈️ Flight Hunter

on:
  # Roda automaticamente 4 vezes por dia
  schedule:
    - cron: '0 6,12,18,0 * * *'   # 06h, 12h, 18h, 00h UTC
  # Permite disparar manualmente pela aba "Actions" do GitHub
  workflow_dispatch:

jobs:
  hunt:
    name: Hunt for flight deals
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🛫 Run Flight Hunter
        env:
          TELEGRAM_TOKEN:         ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
          AMADEUS_CLIENT_ID:      ${{ secrets.AMADEUS_CLIENT_ID }}
          AMADEUS_CLIENT_SECRET:  ${{ secrets.AMADEUS_CLIENT_SECRET }}
        run: npx ts-node src/index.ts
